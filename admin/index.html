<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kokebok Admin</title>
  <link rel="stylesheet" href="/src/main.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script>
    const t = localStorage.getItem('theme');
    if (t) document.documentElement.setAttribute('data-theme', t);
  </script>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png" />
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
</head>
<body>
  <!-- List view (default) -->
  <div id="view-list"></div>

  <!-- Edit view (hidden initially) -->
  <div id="view-edit" hidden>
    <div class="edit-bar">
      <div class="edit-bar-inner">
        <button class="back-link" id="back-btn">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7" stroke-linecap="round"/></svg>
          Oppskrifter
        </button>
        <span class="title-crumb" id="form-title">Ny oppskrift</span>
        <div class="edit-bar-actions">
          <span class="unsaved-dot" id="unsaved-indicator" style="display:none">
            <span class="d"></span> Ikke lagret
          </span>
          <button class="icon-btn" id="edit-theme-toggle" aria-label="Bytt tema">☾</button>
        </div>
      </div>
    </div>
    <div id="form-area"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
